{% extends "base.html" %}

{% block content %}
<style>
    :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --border-color: #cbd5e1;
        --bg-light: #f8fafc;
    }

    .form-group label { 
        display: block; 
        margin-bottom: 8px; 
        font-weight: 600; 
        color: #1e293b; 
        font-size: 0.9em; 
    }

    .form-control { 
        width: 100%; 
        padding: 12px; 
        border-radius: 8px; 
        border: 1px solid var(--border-color); 
        background: var(--bg-light); 
        color: var(--text-main); 
        transition: all 0.3s ease; 
        box-sizing: border-box;
    }

    .form-control:focus { 
        outline: none; 
        border-color: var(--primary); 
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); 
        background: white; 
    }

    .modern-card { 
        background: white; 
        border-radius: 16px; 
        box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); 
        padding: 35px; 
        border-top: 5px solid var(--primary); 
    }

    .btn-submit { 
        background: var(--primary); 
        color: white; 
        border: none; 
        border-radius: 8px; 
        font-weight: 700; 
        cursor: pointer; 
        transition: background 0.3s, transform 0.2s; 
        padding: 15px; 
    }

    .btn-submit:hover { 
        background: var(--primary-hover); 
    }

    .btn-cancel {
        background: #94a3b8; 
        color: white; 
        padding: 15px; 
        text-align: center; 
        text-decoration: none; 
        border-radius: 8px; 
        font-weight: 600;
        transition: background 0.3s;
    }
    .btn-cancel:hover { background: #64748b; }

    .section-title { 
        margin-top: 35px; 
        border-bottom: 2px solid #f1f5f9; 
        padding-bottom: 10px; 
        color: var(--text-main); 
        font-size: 1.15em; 
        font-weight: 700;
    }

    .required-asterisk { 
        color: #ef4444; 
        margin-left: 3px; 
    }

    /* Zone d'avatar de l'élève */
    .photo-upload-wrapper {
        display: flex;
        align-items: center;
        gap: 20px;
        background: var(--bg-light);
        padding: 15px;
        border-radius: 12px;
        border: 2px dashed #e2e8f0;
    }

    .preview-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        color: #94a3b8;
        border: 2px solid white;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }

    .preview-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
</style>

<div style="max-width: 850px; margin: 0 auto; padding: 20px 10px;">
    <div class="modern-card">
        <h2 style="margin-top: 0; margin-bottom: 5px; color: var(--text-main); font-weight: 800;">
            <i class="fas fa-user-plus" style="color: var(--primary);"></i> Nouvelle Inscription
        </h2>
        <p style="color: var(--text-muted); margin-bottom: 25px;">
            Année Scolaire cible : <span style="background: #dbeafe; color: var(--primary-hover); padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 0.85em;">{{ annee_active.nom }}</span>
        </p>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <h3 class="section-title"><i class="fas fa-image" style="margin-right: 8px;"></i>Photo de l'élève</h3>
            <div class="photo-upload-wrapper" style="margin-top: 15px;">
                <div class="preview-avatar" id="avatar-container">
                    <i class="fas fa-user fa-2x" id="default-icon"></i>
                    <img id="image-preview" style="display: none;">
                </div>
                <div>
                    <label style="margin-bottom: 5px;">Sélectionner un photo</label>
                    <input type="file" name="photo" id="photo-input" accept="image/*" class="form-control" style="padding: 8px;">
                    <small style="color: var(--text-muted); display: block; margin-top: 4px;">Formats acceptés : JPG, PNG</small>
                </div>
            </div>

            <h3 class="section-title"><i class="fas fa-id-card" style="margin-right: 8px;"></i>Identité civile</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 15px;">
                <div class="form-group">
                    <label>Prénom <span class="required-asterisk">*</span></label>
                    <input type="text" name="prenom" class="form-control" placeholder="Ex: Fatoumata" required>
                </div>
                <div class="form-group">
                    <label>Nom <span class="required-asterisk">*</span></label>
                    <input type="text" name="nom" class="form-control" placeholder="Ex: Berthé" required>
                </div>
                <div class="form-group">
                    <label>Genre / Sexe <span class="required-asterisk">*</span></label>
                    <select name="sexe" class="form-control" required>
                        <option value="">Sélectionnez...</option>
                        <option value="M">Masculin</option>
                        <option value="F">Féminin</option>
                    </select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px;">
                <div class="form-group">
                    <label>Classe d'affectation <span class="required-asterisk">*</span></label>
                    <select name="classe" class="form-control" required>
                        <option value="">Sélectionnez une classe...</option>
                        {% for c in classes %}
                            <option value="{{ c.id }}">{{ c.nom }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Date de Naissance</label>
                    <input type="date" name="date_naissance" class="form-control">
                </div>
                <div class="form-group">
                    <label>Lieu de Naissance</label>
                    <input type="text" name="lieu_naissance" class="form-control" placeholder="Ex: Bamako">
                </div>
            </div>

            <h3 class="section-title"><i class="fas fa-users" style="margin-right: 8px;"></i>Responsable légal / Tuteur</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 15px;">
                <div class="form-group">
                    <label>Nom complet du tuteur</label>
                    <input type="text" name="tuteur" class="form-control" placeholder="Ex: Cheick Oumar Keïta">
                </div>
                <div class="form-group">
                    <label>Contact téléphonique</label>
                    <input type="text" name="telephone" class="form-control" placeholder="Ex: 70 00 00 00">
                </div>
            </div>
            
            <div class="form-group" style="margin-top: 20px;">
                <label>Adresse de résidence du tuteur</label>
                <input type="text" name="adresse_tuteur" class="form-control" placeholder="Ex: Kalaban Coura, Rue 230, Porte 15">
            </div>

            <div style="margin-top: 40px; display: flex; gap: 15px; flex-wrap: wrap;">
                <button type="submit" class="btn-submit" style="flex: 2; min-width: 200px;">
                    <i class="fas fa-check-circle"></i> Valider l'inscription 
                </button>
                <a href="{% url 'liste_eleves' ecole.id %}" class="btn-cancel" style="flex: 1; min-width: 120px;">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    // Script d'aperçu dynamique de l'image
    const photoInput = document.getElementById('photo-input');
    const imagePreview = document.getElementById('image-preview');
    const defaultIcon = document.getElementById('default-icon');

    photoInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.addEventListener('load', function() {
                imagePreview.setAttribute('src', this.result);
                imagePreview.style.display = 'block';
                defaultIcon.style.display = 'none';
            });
            reader.readAsDataURL(file);
        } else {
            imagePreview.style.display = 'none';
            defaultIcon.style.display = 'block';
        }
    });
</script>
{% endblock %}
