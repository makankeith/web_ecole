{% extends "base.html" %}

{% block content %}
<style>
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #1e293b; font-size: 0.9em; }
    .form-control { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; background: #f8fafc; color: #1e293b; transition: all 0.3s ease; }
    .form-control:focus { outline: none; border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15); background: white; }
    .modern-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 30px; border-top: 5px solid #f59e0b; }
    .btn-submit { background: #f59e0b; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.3s; padding: 15px; }
    .btn-submit:hover { background: #d97706; }
    .section-title { margin-top: 30px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; color: #0f172a; font-size: 1.1em; }
</style>

<div style="max-width: 800px; margin: 0 auto; padding-top: 20px;">
    <div class="modern-card">
        <h2 style="margin-top: 0; margin-bottom: 5px; color: #0f172a;">
            <i class="fas fa-edit" style="color: #f59e0b;"></i> Modifier le profil de l'élève
        </h2>
        <p style="color: #64748b; margin-bottom: 25px;">
            Mise à jour des informations de : <strong style="color: #1e293b;">{{ eleve.prenom }} {{ eleve.nom }}</strong>
        </p>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <h3 class="section-title">Identité de l'élève</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 15px;">
                <div class="form-group">
                    <label>Prénom <span style="color:#ef4444;">*</span></label>
                    <input type="text" name="prenom" class="form-control" value="{{ eleve.prenom }}" required>
                </div>
                <div class="form-group">
                    <label>Nom <span style="color:#ef4444;">*</span></label>
                    <input type="text" name="nom" class="form-control" value="{{ eleve.nom }}" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;">
                <div class="form-group">
                    <label>Date de Naissance</label>
                    <input type="date" name="date_naissance" class="form-control" value="{{ eleve.date_naissance|date:'Y-m-d' }}">
                </div>
                <!-- Note : La classe se modifie généralement via la vue "Passation" ou "Réinscription", pas juste en modifiant le nom -->
                <div class="form-group">
                    <label>Sexe</label>
                    <select name="sexe" class="form-control">
                        <option value="M" {% if eleve.sexe == 'M' %}selected{% endif %}>Masculin</option>
                        <option value="F" {% if eleve.sexe == 'F' %}selected{% endif %}>Féminin</option>
                    </select>
                </div>
            </div>

            <h3 class="section-title">Informations du Tuteur</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 15px;">
                <div class="form-group">
                    <label>Nom complet du tuteur</label>
                    <input type="text" name="tuteur" class="form-control" value="{{ eleve.nom_tuteur|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Contact téléphonique</label>
                    <input type="text" name="telephone" class="form-control" value="{{ eleve.telephone_tuteur|default:'' }}">
                </div>
            </div>

            <div style="margin-top: 35px; display: flex; gap: 15px;">
                <button type="submit" class="btn-submit" style="flex: 2;">
                    <i class="fas fa-save"></i> Enregistrer les modifications
                </button>
                <a href="{% url 'profil_eleve' ecole.id eleve.id %}" class="btn" style="flex: 1; background: #94a3b8; color: white; padding: 15px; text-align: center; text-decoration: none; border-radius: 8px; font-weight: 600;">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
